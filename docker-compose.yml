services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - db
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./:/app # live code: `docker compose restart app` applies edits
      - hfcache:/root/.cache/huggingface # keep the bge-m3 download across restarts

volumes:
  pgdata:
  hfcache:
